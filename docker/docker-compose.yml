services:
  etcd:
    container_name: milvus-etcd
    image: quay.io/coreos/etcd:v3.5.18
    environment:
      - ETCD_AUTO_COMPACTION_MODE=revision
      - ETCD_AUTO_COMPACTION_RETENTION=1000
      - ETCD_QUOTA_BACKEND_BYTES=4294967296
      - ETCD_SNAPSHOT_COUNT=50000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/etcd:/etcd
    command: etcd -advertise-client-urls=http://127.0.0.1:2379 -listen-client-urls http://0.0.0.0:2379 --data-dir /etcd
    healthcheck:
      test: ["CMD", "etcdctl", "endpoint", "health"]
      interval: 30s
      timeout: 20s
      retries: 3

  minio:
    container_name: milvus-minio
    image: minio/minio:RELEASE.2023-03-20T20-16-18Z
    environment:
      MINIO_ACCESS_KEY: minioadmin
      MINIO_SECRET_KEY: minioadmin
    ports:
      - "9001:9001"
      - "9000:9000"
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/minio:/minio_data
    command: minio server /minio_data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  standalone:
    container_name: milvus-standalone
    image: milvusdb/milvus:v2.5.6
    command: ["milvus", "run", "standalone"]
    security_opt:
    - seccomp:unconfined
    environment:
      ETCD_ENDPOINTS: etcd:2379
      MINIO_ADDRESS: minio:9000
    volumes:
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/milvus:/var/lib/milvus
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9091/healthz"]
      interval: 30s
      start_period: 90s
      timeout: 20s
      retries: 3
    ports:
      - "19530:19530"
      - "9091:9091"
    depends_on:
      - "etcd"
      - "minio"

  attu:
    container_name: milvus-attu
    image: zilliz/attu:latest
    environment:
      MILVUS_URL: milvus-standalone:19530
    ports:
      - "18000:3000"
    depends_on:
      - "standalone"

  reranker:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-latest
    container_name: bge-reranker
    ports:
      - "18081:80"
    volumes:
      - ../models/rerank/BAAI/bge-reranker-large:/model
    environment:
      - MODEL_ID=/model
      - PORT=80
    restart: unless-stopped

  embedding:
   image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8
   container_name: embedding
   restart: unless-stopped
   ports:
     - "18088:80"
   environment:
     MODEL_ID: /models/bge-large-zh-v1.5
     MAX_CONCURRENT_REQUESTS: "16"
     MAX_BATCH_TOKENS: "16384"
   volumes:
     - F:/docker/models/embedding/bge-large-zh-v1.5:/models/bge-large-zh-v1.5

  # 新增 bge-m3 嵌入模型服务
  bge-m3:
    image: ghcr.io/huggingface/text-embeddings-inference:cpu-1.8  # 如果是GPU环境请换成cuda版本
    container_name: bge-m3
    restart: unless-stopped
    ports:
      - "18089:80"  # 将宿主机的 18089 端口映射到容器内的 80 端口
    environment:
      - MODEL_ID=/models/bge-m3  # 指向容器内部的模型路径
      - MAX_CONCURRENT_REQUESTS=16
      - MAX_BATCH_TOKENS=16385
    volumes:
      # 将宿主机的本地路径映射到容器内，注意路径必须使用正斜杠
      - F:/docker/models/bge-m3:/models/bge-m3

  mongo:
    image: mongo:7.0-jammy
    container_name: app-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: 123456
      MONGO_INITDB_DATABASE: kaas
    volumes:
      # 👇 改为绑定挂载，与 etcd/minio/milvus 保持一致的数据目录风格
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/mongo/data:/data/db
      - ${DOCKER_VOLUME_DIRECTORY:-.}/volumes/mongo/config:/data/configdb
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh --quiet
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  default:
    name: milvus